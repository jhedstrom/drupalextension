name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    env:
      PHP_VERSION: '8.4'
      DRUPAL_VERSION: '11'
      DOCKER_USER_ID: '1001'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start Docker containers
        run: docker compose up -d

      - name: Configure git safe directory
        run: docker compose exec -T php git config --global --add safe.directory /var/www/html

      - name: Install Composer dependencies
        run: docker compose exec -T php composer install

      - name: Validate composer.json
        run: docker compose exec -T php composer validate --no-interaction

      - name: Check composer.json is normalized
        run: docker compose exec -T php composer normalize --dry-run

      - name: Run linting
        run: |
          docker compose exec -T php vendor/bin/parallel-lint src spec tests
          docker compose exec -T php vendor/bin/phpcs --standard=./phpcs.xml -p
          docker compose exec -T php vendor/bin/phpcs --standard=./phpcs-drupal.xml -p
          docker compose exec -T php vendor/bin/phpstan
          docker compose exec -T php vendor/bin/rector process --dry-run
          docker compose exec -T php vendor/bin/gherkinlint lint tests/behat/features

  tests:
    name: PHP ${{ matrix.php_version }}, Drupal ${{ matrix.drupal_version }}, Deps ${{ matrix.deps }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php_version: '8.2'
            drupal_version: '10'
            deps: 'normal'
          - php_version: '8.2'
            drupal_version: '10'
            deps: 'lowest'
          - php_version: '8.3'
            drupal_version: '10'
            deps: 'normal'
          - php_version: '8.3'
            drupal_version: '10'
            deps: 'lowest'
          - php_version: '8.3'
            drupal_version: '11'
            deps: 'normal'
          - php_version: '8.3'
            drupal_version: '11'
            deps: 'lowest'
          - php_version: '8.4'
            drupal_version: '10'
            deps: 'normal'
          - php_version: '8.4'
            drupal_version: '10'
            deps: 'lowest'
          - php_version: '8.4'
            drupal_version: '11'
            deps: 'normal'
            coverage: true
          - php_version: '8.4'
            drupal_version: '11'
            deps: 'lowest'

    env:
      PHP_VERSION: ${{ matrix.php_version }}
      DRUPAL_VERSION: ${{ matrix.drupal_version }}
      DOCKER_USER_ID: '1001'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Start Docker containers
        run: docker compose up -d

      - name: Configure git safe directory
        run: docker compose exec -T php git config --global --add safe.directory /var/www/html

      - name: Add Drupal core dependency
        run: docker compose exec -u ${DOCKER_USER_ID} -T php composer require --no-interaction --dev --no-update drupal/core:^${DRUPAL_VERSION} drupal/core-composer-scaffold:^${DRUPAL_VERSION}

      - name: Remove PHPUnit 11 for Drupal 10
        if: ${{ !matrix.coverage }}
        run: docker compose exec -u ${DOCKER_USER_ID} -T php composer remove --no-interaction --dev --no-update phpunit/phpunit

      - name: Install Composer dependencies
        run: |
          if [[ "${{ matrix.deps }}" == "lowest" ]]; then
            docker compose exec -T php composer update --prefer-lowest --prefer-stable
          else
            docker compose exec -T php composer install
          fi

      - name: Copy Drush configuration
        run: docker compose exec -T php cp -r tests/behat/fixtures/drupal/drush build/drush

      - name: Run PHPSpec tests
        run: docker compose exec -T php vendor/bin/phpspec run -f pretty --no-interaction

      - name: Run PHPUnit tests
        if: ${{ matrix.coverage }}
        run: docker compose exec -T php php -d pcov.enabled=1 -d pcov.directory=. vendor/bin/phpunit -c phpunit.xml

      - name: Provision Drupal site
        run: docker compose exec -T php ./vendor/bin/drush --yes --root=build/web site-install --db-url=mysql://drupal:drupal@database/drupal --debug

      - name: Copy test fixtures
        run: docker compose exec -T php cp -r tests/behat/fixtures/drupal/modules/behat_test build/web/modules

      - name: Adjust Drupal configurations
        run: |
          docker compose exec -T php ./vendor/bin/drush --yes --root=build/web pmu page_cache,big_pipe
          docker compose exec -T php ./vendor/bin/drush --yes --root=build/web en behat_test
          docker compose exec -u ${DOCKER_USER_ID} -T php vendor/bin/drush cset core.date_format.olivero_medium pattern 'j F, Y'
          docker compose exec -u ${DOCKER_USER_ID} -T php vendor/bin/drush cset automated_cron.settings interval 0
          docker compose exec -u ${DOCKER_USER_ID} -T php vendor/bin/drush cset user.settings register visitors

      - name: Run Behat tests with coverage
        if: ${{ matrix.coverage }}
        run: |
          docker compose exec -T php bash -c 'rm -rf .logs/coverage/behat_cli/phpcov/*.php 2>/dev/null; mkdir -p .logs/coverage/behat_cli/phpcov || true'
          docker compose exec -T php php -d pcov.enabled=1 -d pcov.directory=src vendor/bin/behat -fprogress --strict --colors
          docker compose exec -T php php scripts/merge-coverage.php

      - name: Run Behat tests
        if: ${{ !matrix.coverage }}
        run: |
          docker compose exec -T php vendor/bin/behat -fprogress --strict
          docker compose exec -T php vendor/bin/behat -fprogress --profile=drupal --strict
          docker compose exec -T php vendor/bin/behat -fprogress --profile=drupal_https --strict

      - name: Extract PHPUnit coverage
        if: ${{ matrix.coverage }}
        run: |
          RATE=$(grep -om1 'line-rate="[0-9.]*"' .logs/coverage/phpunit/cobertura.xml | tr -cd '0-9.')
          PERCENT=$(awk "BEGIN {printf \"%.2f\", $RATE*100}")
          echo "PHPUnit coverage: $PERCENT% (threshold: $CI_PHPUNIT_COVERAGE_THRESHOLD%)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "PHPUNIT_COVERAGE_PERCENT=${PERCENT}" >> "$GITHUB_ENV"
        env:
          CI_PHPUNIT_COVERAGE_THRESHOLD: ${{ vars.CI_PHPUNIT_COVERAGE_THRESHOLD || '0' }}

      - name: Extract Behat coverage
        if: ${{ matrix.coverage }}
        run: |
          RATE=$(grep -om1 'line-rate="[0-9.]*"' .logs/coverage/behat_merged/cobertura.xml | tr -cd '0-9.')
          PERCENT=$(awk "BEGIN {printf \"%.2f\", $RATE*100}")
          echo "Behat coverage: $PERCENT% (threshold: $CI_BEHAT_COVERAGE_THRESHOLD%)" | tee -a "$GITHUB_STEP_SUMMARY"
          echo "BEHAT_COVERAGE_PERCENT=${PERCENT}" >> "$GITHUB_ENV"
        env:
          CI_BEHAT_COVERAGE_THRESHOLD: ${{ vars.CI_BEHAT_COVERAGE_THRESHOLD || '0' }}

      - name: Check PHPUnit coverage threshold
        if: ${{ matrix.coverage }}
        run: |
          if [ "${PHPUNIT_COVERAGE_PERCENT//.}" -lt "$((CI_PHPUNIT_COVERAGE_THRESHOLD*100))" ]; then
            echo "FAIL: PHPUnit coverage ${PHPUNIT_COVERAGE_PERCENT}% is below threshold ${CI_PHPUNIT_COVERAGE_THRESHOLD}%"
            exit 1
          fi
        env:
          CI_PHPUNIT_COVERAGE_THRESHOLD: ${{ vars.CI_PHPUNIT_COVERAGE_THRESHOLD || '0' }}

      - name: Check Behat coverage threshold
        if: ${{ matrix.coverage }}
        run: |
          if [ "${BEHAT_COVERAGE_PERCENT//.}" -lt "$((CI_BEHAT_COVERAGE_THRESHOLD*100))" ]; then
            echo "FAIL: Behat coverage ${BEHAT_COVERAGE_PERCENT}% is below threshold ${CI_BEHAT_COVERAGE_THRESHOLD}%"
            exit 1
          fi
        env:
          CI_BEHAT_COVERAGE_THRESHOLD: ${{ vars.CI_BEHAT_COVERAGE_THRESHOLD || '0' }}

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts-php${{ matrix.php_version }}-drupal${{ matrix.drupal_version }}-${{ matrix.deps }}
          path: .logs
          include-hidden-files: true
          if-no-files-found: error
