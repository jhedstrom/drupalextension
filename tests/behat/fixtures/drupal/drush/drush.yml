options:
  # Drush 13 fails with "Invalid URI: Host is malformed" when it tries to
  # bootstrap Drupal without a --uri. The Behat 'DrushDriver' does not pass
  # one, so set the default here. Tests run inside the 'cli' container, which
  # reaches the Lagoon nginx as 'http://nginx:8080'.
  uri: http://nginx:8080

command:
  sql:
    cli:
      options:
        extra: '--disable-ssl'
    query:
      options:
        extra: '--disable-ssl'
    dump:
      options:
        extra: '--disable-ssl'
        extra-dump: '--disable-ssl --no-tablespaces'
    drop:
      options:
        extra: '--disable-ssl'
    create:
      options:
        extra: '--disable-ssl'
  site:
    install:
      options:
        extra: '--disable-ssl'
